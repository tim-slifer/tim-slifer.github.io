# Dependencies
markdown:           kramdown
highlighter:        rouge

# Setup
title:              Tim Slifer
tagline:            'slifer.io'
description:        'Automation Engineer'
url:                https://www.slifer.io
# baseurl:          '/hydeout'
# the optional subpath of your site, e.g. "/blog"
# NB: This applies to all pages in your Jekyll site.
# If you want to move just the blog index pages but keep
# other pages at root, see the paginate_path and
# sidebar_blog_link below.

author:
    name:           'Tim Slifer'
    url:            https://www.slifer.io

paginate:           5
# paginate_path:    '/page:num'
# Or '/blog/page:num' if you want to move your index pages

plugins:
    - jekyll-feed
    - jekyll-gist
    - jekyll-paginate

# Sidebar link settings
sidebar_home_link:  true
# sidebar_blog_link:  '/blog'
# By default, your home page is your blog
# page. If you change your paginate_path,
# set this to the root of the paginate_path
# to enable a separate blog link.

github:             https://github.com/tim-slifer
gitlab:             https://gitlab.com/tim-slifer
stackoverflow:      https://stackoverflow.com/users/3763338/tim-slifer
linkedin:           https://linkedin.com/in/timslifer
